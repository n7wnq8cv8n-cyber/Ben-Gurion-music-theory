<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>המורה לזיהוי סולמות ביצירה</title>
<style>
  :root{
    --font-serif: 'David Libre', 'Frank Ruhl Libre', Georgia, serif;
    --font-sans: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
    --cream:#FAF6EC;
    --paper:#FFFDF8;
    --ink:#2B2640;
    --ink-soft:#5b5470;
    --gold:#C9A227;
    --gold-soft:#E8D9A8;
    --teacher-bg:#F0E8D6;
    --student-bg:#2B2640;
    --student-text:#FAF6EC;
    --line:#E3D9C2;
    --shadow: 0 8px 24px rgba(43,38,64,0.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 10%, #fffaf0 0%, transparent 45%),
      var(--cream);
    font-family:var(--font-sans);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .app{
    width:100%;
    max-width:560px;
    height:min(720px,92vh);
    background:var(--paper);
    border-radius:28px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border:1px solid var(--line);
    position:relative;
  }

  /* Header with staff lines */
  .header{
    position:relative;
    padding:22px 24px 18px;
    background:linear-gradient(180deg,#FFFDF8 0%, #FAF3E2 100%);
    border-bottom:1px solid var(--line);
    overflow:hidden;
  }
  .staff{
    position:absolute;
    inset:0;
    opacity:0.35;
    pointer-events:none;
  }
  .staff svg{width:100%;height:100%;}
  .header-content{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .clef-badge{
    width:48px;height:48px;
    border-radius:50%;
    background:var(--ink);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    box-shadow:0 4px 10px rgba(43,38,64,0.25);
  }
  .clef-badge svg{width:26px;height:26px;}
  .header-text h1{
    font-family:var(--font-serif);
    font-size:19px;
    margin:0;
    font-weight:700;
    color:var(--ink);
  }
  .header-text p{
    margin:2px 0 0;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .status-dot{
    width:8px;height:8px;border-radius:50%;
    background:#7A9B76;
    display:inline-block;
    margin-left:6px;
    box-shadow:0 0 0 0 rgba(122,155,118,0.6);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(122,155,118,0.5);}
    70%{box-shadow:0 0 0 6px rgba(122,155,118,0);}
    100%{box-shadow:0 0 0 0 rgba(122,155,118,0);}
  }

  /* Messages */
  .messages{
    flex:1;
    overflow-y:auto;
    padding:22px 18px;
    display:flex;
    flex-direction:column;
    gap:14px;
    scroll-behavior:smooth;
  }
  .messages::-webkit-scrollbar{width:6px;}
  .messages::-webkit-scrollbar-thumb{background:var(--gold-soft);border-radius:10px;}

  .row{
    display:flex;
    gap:8px;
    max-width:88%;
    animation:rise .35s ease both;
  }
  .row.teacher{align-self:flex-start;}
  .row.student{align-self:flex-end;flex-direction:row-reverse;}

  @keyframes rise{
    from{opacity:0;transform:translateY(10px) scale(.98);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }

  .avatar{
    width:30px;height:30px;border-radius:50%;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
    margin-top:2px;
  }
  .row.teacher .avatar{background:var(--gold-soft);color:var(--ink);font-size:18px;}
  .row.student .avatar{background:var(--ink);color:var(--gold-soft);}

  .bubble{
    padding:12px 16px;
    border-radius:18px;
    font-size:14.5px;
    line-height:1.65;
    white-space:pre-wrap;
    box-shadow:0 2px 6px rgba(43,38,64,0.06);
  }
  .row.teacher .bubble{
    background:var(--teacher-bg);
    color:var(--ink);
    border-bottom-left-radius:6px;
  }
  .row.student .bubble{
    background:var(--student-bg);
    color:var(--student-text);
    border-bottom-right-radius:6px;
  }

  /* Typing indicator — musical notes instead of dots */
  .typing-row{align-self:flex-start;display:flex;gap:8px;max-width:88%;}
  .typing-bubble{
    background:var(--teacher-bg);
    border-radius:18px;
    border-bottom-left-radius:6px;
    padding:10px 16px;
    display:flex;
    gap:6px;
    align-items:flex-end;
    height:34px;
  }
  .note{
    font-size:14px;
    color:var(--ink-soft);
    display:inline-block;
    animation:bob 1.1s infinite ease-in-out;
  }
  .note:nth-child(2){animation-delay:.15s;}
  .note:nth-child(3){animation-delay:.3s;}
  @keyframes bob{
    0%,60%,100%{transform:translateY(0);opacity:.55;}
    30%{transform:translateY(-7px);opacity:1;}
  }

  /* Input */
  .input-bar{
    padding:14px 16px 18px;
    border-top:1px solid var(--line);
    background:var(--paper);
    display:flex;
    gap:10px;
    align-items:flex-end;
  }
  .input-wrap{
    flex:1;
    background:var(--cream);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:6px 8px 6px 16px;
    display:flex;
    align-items:center;
    transition:border-color .2s, box-shadow .2s;
  }
  .input-wrap:focus-within{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,162,39,0.15);
  }
  textarea{
    flex:1;
    border:none;
    background:transparent;
    resize:none;
    outline:none;
    font-family:var(--font-sans);
    font-size:14.5px;
    color:var(--ink);
    padding:8px 4px;
    max-height:100px;
    line-height:1.4;
  }
  textarea::placeholder{color:#a39c8c;}

  .send-btn{
    width:42px;height:42px;
    border-radius:50%;
    border:none;
    background:var(--ink);
    color:var(--gold-soft);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:transform .15s, background .2s;
    box-shadow:0 4px 10px rgba(43,38,64,0.25);
  }
  .send-btn:hover{background:#3a3458;transform:scale(1.06);}
  .send-btn:active{transform:scale(0.94);}
  .send-btn:disabled{opacity:.45;cursor:default;transform:none;}
  .send-btn svg{width:18px;height:18px;transform:scaleX(-1);}

  .reset-link{
    text-align:center;
    font-size:11.5px;
    color:#b0a78f;
    padding-bottom:6px;
    cursor:pointer;
    user-select:none;
  }
  .reset-link:hover{color:var(--ink-soft);text-decoration:underline;}

  @media (max-width:480px){
    .app{height:96vh;border-radius:20px;}
    .header{padding:18px 16px 14px;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="staff">
      <svg viewBox="0 0 600 90" preserveAspectRatio="none">
        <line x1="0" y1="15" x2="600" y2="15" stroke="#2B2640" stroke-width="1"/>
        <line x1="0" y1="30" x2="600" y2="30" stroke="#2B2640" stroke-width="1"/>
        <line x1="0" y1="45" x2="600" y2="45" stroke="#2B2640" stroke-width="1"/>
        <line x1="0" y1="60" x2="600" y2="60" stroke="#2B2640" stroke-width="1"/>
        <line x1="0" y1="75" x2="600" y2="75" stroke="#2B2640" stroke-width="1"/>
      </svg>
    </div>
    <div class="header-content">
      <div class="clef-badge">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="8" y1="4" x2="8" y2="16.5" stroke="#E8D9A8" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="17" y1="3" x2="17" y2="15.5" stroke="#E8D9A8" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M8 4 L17 3" stroke="#E8D9A8" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M8 7.5 L17 6.5" stroke="#E8D9A8" stroke-width="1.4" stroke-linecap="round"/>
          <ellipse cx="6.3" cy="17" rx="2.3" ry="1.7" fill="#E8D9A8" transform="rotate(-18 6.3 17)"/>
          <ellipse cx="15.3" cy="16" rx="2.3" ry="1.7" fill="#E8D9A8" transform="rotate(-18 15.3 16)"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>המורה לזיהוי סולמות ביצירה</h1>
        <p><span class="status-dot"></span>נלמד לזהות סולמות, צעד אחר צעד</p>
      </div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div id="typingIndicator" style="display:none; padding:0 18px;">
    <div class="typing-row">
      <div class="avatar" style="background:var(--gold-soft);color:var(--ink);font-size:18px;">𝄢</div>
      <div class="typing-bubble">
        <span class="note">♪</span><span class="note">♫</span><span class="note">♪</span>
      </div>
    </div>
  </div>

  <div class="reset-link" id="resetBtn">התחל שיחה חדשה</div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="userInput" rows="1" placeholder="כתוב את תשובתך כאן..."></textarea>
    </div>
    <button class="send-btn" id="sendBtn" title="שלח">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 11L21 3L13 21L11 13L3 11Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `אתה מורה לתיאוריה מוזיקלית שמטרתו ללמד תלמידים לזהות באיזה סולם כתובה יצירה. העיקרון המרכזי: אתה לא נותן תשובה מיד, אלא מוביל את התלמיד דרך שאלות, הסקת מסקנות ותרחישים.

כללים כלליים:
• שאל שאלה אחת בכל הודעה.
• השתמש בשפה פשוטה וברורה.
• עודד את התלמיד להסיק מסקנות בעצמו.
• אם התלמיד טועה, תן רמז ולא פתרון מלא מיד.
• אל תדלג שלבים גם אם התלמיד שואל ישירות "מה הסולם?".

שיטת עבודה (מבוססת "אם" ו"כאשר"):

שלב 1 – סימני היתק
אם התלמיד לא יודע מאיפה להתחיל:
• שאל: "כאשר אתה מסתכל על המפתח, כמה סימני היתק יש (דיאזים או במולים)?"

שלב 2 – זיהוי אפשרויות
אם התלמיד נותן מספר סימני היתק:
• שאל: "כאשר יש X סימנים, אילו שני סולמות אפשריים (מז'ור ומינור מקביל)?"
• אם התלמיד מתקשה למצוא את שם הסולם המז'ורי: כאשר מדובר בדיאזים, הדיאז האחרון הוא "הטון המוביל" של הסולם - כלומר אם עולים ממנו סקונדה קטנה, מגיעים לטוניקה (שם הסולם המז'ורי). כאשר מדובר בבמולים, הבמול הלפני-אחרון (זה שלפני האחרון) הוא בעצמו שם הסולם המז'ורי (למעט המקרה של במול אחד בלבד, שבו הכלל לא חל).

שלב 3 – טוניקה
אם התלמיד מתקשה:
• שאל: "כאשר אתה חושב על צליל שמרגיש כמו 'בית', על איזה צליל היית מסיים את היצירה?"

שלב 4 – סימני מקרה
אם מופיעים שינויים לא צפויים (סימני מקרה שלא מופיעים במפתח):
• שאל: "אם מופיע סימן מקרה שמגביה את המדרגה השביעית של הסולם, איך זה יכול לרמוז ולחזק שמדובר בסולם מינור ולא מז'ור?"
• לצורך הזיהוי הבסיסי מספיק לקבוע אם הסולם מז'ור או מינור טבעי (רגיל). סימן ההגבהה מעיד על מינור הרמוני, אך אין צורך להגיע לסיווג מדויק (הרמוני/מלודי) כדי להשלים את הזיהוי - הוא רק עוד רמז שמחזק שמדובר במינור.

שלב 5 – סיכום
כאשר התלמיד עבר את השלבים:
• בקש ממנו לנסח מסקנה מלאה.
• רק אז אשר, תקן או חדד.

כללי עומק:
• אם התלמיד מבקש תשובה ישירה, הפנה אותו לשלב הנוכחי בתהליך.
• אם התלמיד כבר יודע את הסולם, בקש ממנו להסביר איך הגיע אליו.
• תמיד לחזק את ההיגיון התאורטי: טוניקה, קדנצה, וסימני היתק.

מטרה סופית: שהתלמיד יוכל לזהות סולם בעצמו גם בלי עזרה.

כללי דיוק תיאורטי (חובה להקפיד עליהם, ללא יוצא מן הכלל):
• לעולם אל תשתמש במונחים לועזיים כמו "signature" - אמור "מפתח" או "סימני ההיתק" בלבד.
• כאשר יש דיאזים: הדיאז האחרון הוא הטון המוביל של הסולם - סקונדה קטנה מעליו נותנת את שם הסולם המז'ורי. הקפד שסקונדה קטנה מעל צליל נתון היא תמיד שם צליל שונה (השם הבא ברצף שמות הצלילים), ולעולם לא אותו צליל: למשל סקונדה קטנה מעל לה דיאז (A#) היא סי (B) - שני צלילים שונים, לא שמות חלופיים לאותו צליל.
• כאשר יש במולים (שניים או יותר): הבמול הלפני-אחרון הוא בעצמו שם הסולם המז'ורי.
• טרצה קטנה (למציאת המינור המקביל) נספרת תמיד מהטוניקה של הסולם המז'ורי כלפי מטה, לפי שמות צלילים - שלושה שמות צלילים ברצף (כולל נקודת המוצא) - ורק אחר כך מוודאים שהמרחק בפועל הוא טון וחצי. בכתיבת החצים כתוב אותם בכיוון ← (מימין לשמאל, כמו הכתיבה בעברית), למשל: לה (1) ← סול (2) ← פה (3) - שלושה שמות צלילים, החל מהטוניקה המז'ורית (לה) ויורדים - ואז בודקים שהמרחק בפועל הוא טון וחצי, מה שמוביל לפה דיאז ולא לפה רגיל.
• דוגמה נוספת (חשוב מאוד לחשב נכון!): כאשר הטוניקה המז'ורית היא מי במול, המינור המקביל נמצא כך: מי במול (1) ← רה (2) ← דו (3) - שלושה שמות צלילים. כעת בודקים את המרחק בפועל בין מי במול לדו: זהו טון וחצי בדיוק (מי במול→רה = טון, רה→דו = חצי טון, סה"כ טון וחצי) - כלומר כבר טרצה קטנה כמו שצריך, בלי שום צורך לשנות את הדו. לכן המינור המקביל של מי במול מז'ור הוא דו מינור (רגיל, בלי סימן היתק נוסף על דו). זו דוגמה לטעות נפוצה שיש להיזהר ממנה: אל תניח שהמרחק בין צליל במול לצליל רגיל הוא תמיד "שני טונים" (טרצה גדולה) - יש לחשב כל מקרה לגופו על פי הצלילים בפועל, ולא לפי הרגלה.
• כשאתה נותן רמז או דוגמה מספרית, בדוק את עצמך פעמיים לפני שליחה - חשב בפועל את מספר חצאי-הטונים בין שני הצלילים (אל תנחש או תסתמך על דפוס כללי), ודא ששם הצליל נכון לפי ספירת שמות צלילים, שכיוון הספירה הוא מהטוניקה המז'ורית כלפי מטה, שכיוון החצים בכתיבה הוא ← (מותאם לעברית), וודא שהמונחים "סקונדה", "טרצה" ו"טון" (לא "טונה" ולא "חצי טון" כשהכוונה לסקונדה קטנה) משמשים נכון.`;

const FIRST_MESSAGE = "שלום! אני כאן כדי לעזור לך ללמוד לזהות סולמות בעצמך, צעד אחר צעד.\n\nבוא נתחיל - כאשר אתה מסתכל על המפתח בתחילת היצירה שאתה בודק, כמה סימני היתק אתה רואה שם (דיאזים # או במולים ♭)?";

let history = [];
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const typingIndicator = document.getElementById('typingIndicator');
const resetBtn = document.getElementById('resetBtn');

function scrollToBottom(){
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addBubble(role, text){
  const row = document.createElement('div');
  row.className = 'row ' + (role === 'assistant' ? 'teacher' : 'student');

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'assistant' ? '𝄢' : '🎵';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollToBottom();
}

function initChat(){
  messagesEl.innerHTML = '';
  history = [{role:'assistant', content: FIRST_MESSAGE}];
  addBubble('assistant', FIRST_MESSAGE);
}

async function sendMessage(){
  const text = inputEl.value.trim();
  if(!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  history.push({role:'user', content:text});
  addBubble('user', text);

  typingIndicator.style.display = 'block';
  scrollToBottom();

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    const replyText = (data.content || [])
      .map(block => block.type === 'text' ? block.text : '')
      .join('\n')
      .trim() || "סליחה, משהו השתבש. נסה שוב.";

    history.push({role:'assistant', content: replyText});
    typingIndicator.style.display = 'none';
    addBubble('assistant', replyText);
  }catch(err){
    typingIndicator.style.display = 'none';
    addBubble('assistant', "אופס, הייתה תקלה בחיבור. נסה לשלוח שוב.");
    console.error(err);
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

resetBtn.addEventListener('click', initChat);

initChat();
</script>
</body>
</html>
